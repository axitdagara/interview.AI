{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-10 col-lg-6 reveal">
        <div class="glass-panel auth-card">
            <h2 class="mb-2">Create Your Account</h2>
            <p class="text-muted mb-4">Save interview history, track progress, and unlock advanced tools.</p>
            <form method="post" novalidate>
                <div class="mb-3">
                    <label class="form-label" for="name">Full Name</label>
                    <input class="form-control" type="text" id="name" name="name" required>
                </div>
                <div class="mb-3">
                    <label class="form-label" for="email">Email Address</label>
                    <input class="form-control" type="email" id="email" name="email" required>
                </div>
                <div class="mb-3">
                    <label class="form-label" for="password">Password</label>
                    <input class="form-control" type="password" id="password" name="password" minlength="6" required>
                </div>
                <div class="mb-4">
                    <label class="form-label" for="confirm_password">Confirm Password</label>
                    <input class="form-control" type="password" id="confirm_password" name="confirm_password" minlength="6" required>
                </div>
                <div class="d-grid">
                    <button class="btn btn-brand btn-lg" type="submit">Create Account</button>
                </div>
            </form>
            <p class="mt-3 mb-0">Already registered? <a href="{{ url_for('auth.login') }}">Sign in here</a>.</p>
        </div>
    </div>
</div>
{% endblock %}
