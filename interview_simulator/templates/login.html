{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-10 col-lg-5 reveal">
        <div class="glass-panel auth-card">
            <h2 class="mb-2">Welcome Back</h2>
            <p class="text-muted mb-4">Sign in to continue your interview preparation journey.</p>
            <form method="post" novalidate>
                <div class="mb-3">
                    <label class="form-label" for="email">Email Address</label>
                    <input class="form-control" type="email" id="email" name="email" required>
                </div>
                <div class="mb-4">
                    <label class="form-label" for="password">Password</label>
                    <input class="form-control" type="password" id="password" name="password" required>
                </div>
                <div class="d-grid">
                    <button class="btn btn-brand btn-lg" type="submit">Login</button>
                </div>
            </form>
            <p class="mt-3 mb-0">New user? <a href="{{ url_for('auth.register') }}">Create an account</a>.</p>
        </div>
    </div>
</div>
{% endblock %}
